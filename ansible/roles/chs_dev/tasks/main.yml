---

- name: Install jq using dnf
  ansible.builtin.dnf:
    name: jq
    state: latest

- name: Download chs-dev install script
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/companieshouse/chs-dev/main/install.sh
    dest: /tmp/install-chs-dev.sh
    mode: '0755'

- name: Install chs-dev
  ansible.builtin.command: bash /tmp/install-chs-dev.sh -f -s /usr/local/bin -d /usr/local/lib/chs-dev

- name: Remove chs-dev install script
  ansible.builtin.file:
    path: /tmp/install-chs-dev.sh
    state: absent
